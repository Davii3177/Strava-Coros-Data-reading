<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run Coach — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>
</head>
<body class="login-body">
  <button id="theme-toggle" class="theme-toggle" type="button">Theme</button>
  <form method="post" class="login-card">
    <p class="login-kicker">Run Coach</p>
    <h1>Enter the club</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">Enter</button>
  </form>
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
